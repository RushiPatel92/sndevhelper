<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <span class="logo">SN</span>
      <span class="title">Dev Helper</span>
      <span id="status" class="status">…</span>
    </header>

    <section id="info" class="card">
      <div class="muted">Detecting instance…</div>
    </section>

    <section class="card shortcut-hint">
      <div><span class="hint-key">Ctrl+Shift+K</span> opens this popup</div>
      <div><span class="hint-key">Ctrl+\</span> opens command palette on this tab</div>
    </section>

    <footer><span id="toast"></span></footer>

    <script src="popup.js"></script>
  </body>
</html>
